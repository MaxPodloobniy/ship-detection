name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check code style
        run: ruff check src/ tests/ entrypoint/ scripts/

      - name: Check formatting
        run: ruff format --check src/ tests/ entrypoint/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install web dependencies
        run: pip install -r requirements-web.txt

      - name: Run type check
        run: mypy src/ entrypoint/ scripts/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-web.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest onnx onnxscript

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  docker:
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download model from HuggingFace
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import hf_hub_download; hf_hub_download('${{ vars.HF_MODEL_REPO }}', 'model.onnx', local_dir='.')"

      - name: Repo name lowercase
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:latest,ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}
